name: API Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run diagnostic
        run: python debug_tokens.py 2>&1 | tee diagnose_output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose
          path: diagnose_output.txt
