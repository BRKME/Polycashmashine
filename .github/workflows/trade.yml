name: Weather Bot — Trade

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no real orders)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      max_bet:
        description: 'Max bet per trade ($)'
        required: false
        default: '10'
      daily_budget:
        description: 'Daily budget ($)'
        required: false
        default: '70'

concurrency:
  group: weather-trader
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests py-clob-client PySocks "httpx[socks]"

      - name: Download daily state
        uses: dawidd6/action-download-artifact@v6
        with:
          name: daily-state
          path: .
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: trade.yml
        continue-on-error: true

      - name: Run trader
        env:
          # Scheduled runs = live trading; manual = uses input (default false)
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          MAX_BET: ${{ inputs.max_bet || '10' }}
          DAILY_BUDGET: ${{ inputs.daily_budget || '70' }}
          MAX_TRADES: '8'
          MIN_EDGE: '15'
          MIN_EV: '0.10'
          POLY_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          POLY_FUNDER: ${{ secrets.POLY_FUNDER }}
          POLY_SIG_TYPE: ${{ secrets.POLY_SIG_TYPE }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python trader.py 2>&1 | tee trade_output.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-state
          path: |
            trade_output.txt
            daily_trades.json
            live_signals.json
            trade_history.json
          retention-days: 30
          overwrite: true
