name: Esports Price Collector

on:
  schedule:
    - cron: '15 * * * *'  # Every hour at :15
  workflow_dispatch:

concurrency:
  group: esports-collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Download history
        uses: dawidd6/action-download-artifact@v6
        with:
          name: esports-data
          path: .
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: esports_collect.yml
        continue-on-error: true

      - name: Collect prices
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: python esports_collector.py 2>&1 | tee esports_output.txt

      - name: Upload data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esports-data
          path: |
            esports_price_history.json
            esports_output.txt
          retention-days: 60
          overwrite: true
