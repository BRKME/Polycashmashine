name: Calibration

on:
  workflow_dispatch:
  schedule:
    # Weekly recalibration every Monday at 03:00 UTC
    - cron: '0 3 * * 1'

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Run calibration
        run: python calibrate.py 2>&1 | tee calibration_output.txt

      - name: Upload calibration
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration
          path: |
            calibration.json
            calibration_output.txt
          retention-days: 90
          overwrite: true

      - name: Commit calibration to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calibration.json
          git diff --staged --quiet || git commit -m "auto: update calibration data ($(date -I))"
          git push
